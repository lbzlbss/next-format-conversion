<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>导入设计到 Figma</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      max-width: 400px;
    }
    
    h1 {
      margin: 0 0 16px 0;
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    p {
      margin: 0 0 20px 0;
      font-size: 14px;
      line-height: 1.6;
      color: #666;
    }
    
    .info-box {
      background: #f0f9ff;
      border-left: 4px solid #667eea;
      padding: 12px 16px;
      margin-bottom: 20px;
      border-radius: 4px;
    }
    
    .info-box p {
      margin: 0;
      font-size: 13px;
      color: #555;
    }
    
    .feature-list {
      list-style: none;
      padding: 0;
      margin: 0 0 20px 0;
    }
    
    .feature-list li {
      padding: 8px 0;
      font-size: 13px;
      color: #666;
      display: flex;
      align-items: center;
    }
    
    .feature-list li:before {
      content: "✓";
      display: inline-block;
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 50%;
      text-align: center;
      line-height: 20px;
      margin-right: 10px;
      font-size: 12px;
      font-weight: bold;
      flex-shrink: 0;
    }
    
    button {
      width: 100%;
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .loading {
      display: none;
      text-align: center;
      margin-top: 16px;
    }
    
    .loading.active {
      display: block;
    }
    
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .status {
      font-size: 13px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 导入设计到 Figma</h1>
    
    <p>将"多媒体格式转换工具"的完整设计导入到当前 Figma 文件中。</p>
    
    <div class="info-box">
      <p><strong>将会创建：</strong></p>
    </div>
    
    <ul class="feature-list">
      <li>完整的页面布局（1200x1400px）</li>
      <li>渐变背景和玻璃态效果</li>
      <li>7个功能标签页</li>
      <li>上传区域、文件列表和配置面板</li>
      <li>所有按钮、输入框和进度条组件</li>
      <li>完整的设计规范和样式</li>
    </ul>
    
    <button id="import-btn" onclick="importDesign()">
      开始导入设计
    </button>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="status">正在创建设计元素...</div>
    </div>
  </div>

  <script>
    function importDesign() {
      const button = document.getElementById('import-btn');
      const loading = document.getElementById('loading');
      
      button.disabled = true;
      button.textContent = '导入中...';
      loading.classList.add('active');
      
      // 发送消息给插件主代码
      parent.postMessage({ pluginMessage: { type: 'import-design' } }, '*');
    }
    
    // 监听来自插件的消息
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      
      if (msg.type === 'import-complete') {
        const button = document.getElementById('import-btn');
        const loading = document.getElementById('loading');
        
        button.textContent = '✓ 导入完成';
        loading.classList.remove('active');
        
        // 3秒后关闭插件
        setTimeout(() => {
          parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
        }, 3000);
      }
      
      if (msg.type === 'import-error') {
        const button = document.getElementById('import-btn');
        const loading = document.getElementById('loading');
        
        button.disabled = false;
        button.textContent = '重试导入';
        loading.classList.remove('active');
        
        alert('导入失败: ' + msg.error);
      }
    };
  </script>
</body>
</html>
